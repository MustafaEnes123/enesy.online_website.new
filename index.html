  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;

      background-color: #000;
      overflow: hidden;
      font-family: 'DM Sans', ui-sans-serif, system-ui, sans-serif;

    /* ── CURTAIN ── */
    .curtain {
      position: fixed;
      top: 0;
      width: 50%;
      height: 100vh;
      z-index: 9000;
      pointer-events: none;
      will-change: transform;
    }

    .curtain-l {
      left: 0;
      /* Fabric: left edge darker, slight sheen towards center */
      background:
        linear-gradient(to right,
          #0a0a0a 0%,
          #181818 30%,
          #1f1f1f 55%,
          #161616 75%,
          #111 100%
        );
      box-shadow: inset -1px 0 0 rgba(255,255,255,0.04);
    }

    .curtain-r {
      right: 0;
      background:
        linear-gradient(to left,
          #0a0a0a 0%,
          #181818 30%,
          #1f1f1f 55%,
          #161616 75%,
          #111 100%
        );
      box-shadow: inset 1px 0 0 rgba(255,255,255,0.04);
    }

    /* Centre seam — thin glow where the two panels meet */
    .curtain-seam {
      position: fixed;
      top: 0;
      left: 50%;
      width: 1px;
      height: 100vh;
      background: rgba(255,255,255,0.07);
      z-index: 9001;
      pointer-events: none;
      transform: translateX(-50%);
    }

    /* ── TICKER HEADER ── */
    .ticker-header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      overflow: hidden;
      background: #000;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      padding: 18px 0;
      z-index: 100;
      opacity: 0; /* revealed by JS */
    }

    .ticker-header::before,
    .ticker-header::after {
      content: '';
      position: absolute;
      top: 0;
      width: 120px;
      height: 100%;
      z-index: 2;
      pointer-events: none;
    }
    .ticker-header::before {
      left: 0;
      background: linear-gradient(to right, #000 30%, transparent);
    }
    .ticker-header::after {
      right: 0;
      background: linear-gradient(to left, #000 30%, transparent);
    }

    .ticker-track {
      display: flex;
      align-items: center;
      width: max-content;
      animation: ticker 36s linear infinite;
      will-change: transform;
    }

    .ticker-track:hover {
      animation-play-state: paused;
    }

    @keyframes ticker {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    .ticker-sentence {
      white-space: nowrap;
      font-size: clamp(13px, 1.1vw, 16px);
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: #fff;
      padding: 0 8px;
    }

    .ticker-dot {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin: 0 28px;
      flex-shrink: 0;
    }

    .ticker-dot svg {
      width: 14px;
      height: 14px;
      fill: #fff;
    }

    /* ── CONTACT BUTTON ── */
    .contact-btn {
      position: fixed;
      top: 72px;
      right: 24px;
      z-index: 200;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 9px 20px;
      background: #fff;
      color: #000;
      font-family: 'DM Sans', ui-sans-serif, system-ui, sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.03em;
      text-decoration: none;
      border-radius: 999px;
      border: 1.5px solid #fff;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
      opacity: 0;
    }

    .contact-btn:hover {
      transform: scale(1.04);
      box-shadow: 0 0 0 3px rgba(255,255,255,0.15);
    }

    /* ── HERO TEXT ── */
    .hero-text {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      z-index: 50;
      pointer-events: none;
      opacity: 0;
      user-select: none;
    }

    .hero-line {
      display: block;
      font-size: clamp(44px, 6.5vw, 96px);
      font-weight: 800;
      color: #fff;
      text-transform: uppercase;
      letter-spacing: -0.025em;
      line-height: 1.05;
      white-space: nowrap;
    }

    .hero-line sup {
      /* AI² — massively oversized, unmissable */
      font-size: 1.05em;
      font-weight: 800;
      vertical-align: super;
      letter-spacing: -0.01em;
      line-height: 0;
    }

    /* ── CIRCLES / BUTTONS ── */
    .circle {
      position: fixed;
      width: 180px;
      height: 180px;
      border-radius: 50%;
      background: #fff;
      z-index: 40;
      opacity: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border: none;
      padding: 0;
      font-family: 'DM Sans', ui-sans-serif, system-ui, sans-serif;
      transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1),
                  box-shadow 0.2s ease;
    }

    .circle:hover {
      transform: scale(1.07);
      box-shadow: 0 8px 40px rgba(255,255,255,0.18);
    }

    .circle:active {
      transform: scale(0.95);
    }

    .circle-label {
      font-size: 13px;
      font-weight: 600;
      color: #000;
      letter-spacing: 0.04em;
      user-select: none;
      pointer-events: none;
      text-align: center;
      line-height: 1.3;
    }

    .c1 { left:  7%;  top: 24%; }

    .c4 { right: 9%;  top: 15%; }

      flex-direction: column;
      align-items: center;
      max-width: 560px;
      margin: 0 auto;
      padding-top: 20px;
    }

    .me-photo {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid rgba(0,0,0,0.08);
      margin-bottom: 20px;
    }

    .me-name {
      font-size: clamp(22px, 3vw, 32px);
      font-weight: 800;
      color: #000;
      letter-spacing: -0.035em;
      text-align: center;
      margin-bottom: 4px;
    }

    .me-title {
      font-size: 13px;

      color: #aaa;
      text-align: center;
      margin-bottom: 28px;
    }

    .me-social {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 36px;
    }

    .me-social-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      border: 1.5px solid #000;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 700;
      color: #000;
      text-decoration: none;
      transition: background 0.15s, color 0.15s;
    }
    .me-social-link:hover { background: #000; color: #fff; }
    .me-social-link svg { width: 16px; height: 16px; flex-shrink: 0; }

    .me-divider {
      width: 100%;
      height: 1px;
      background: rgba(0,0,0,0.1);
      margin-bottom: 32px;
    }

    .me-bio-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.13em;
      color: #aaa;
      margin-bottom: 14px;
      text-align: left;
      width: 100%;
    }

    .me-bio-text {
      font-size: 15px;
      font-weight: 400;
      color: #444;
      line-height: 1.75;
      text-align: left;
      width: 100%;
    }

    /* ── MOBILE ── */
    @media (max-width: 640px) {

      /* Slogan pinned to screen bottom — override the JS animation transform */
      .hero-text {
        top: auto !important;
        bottom: 28px;
        left: 4%;
        right: 4%;
        width: auto;
        padding-bottom: env(safe-area-inset-bottom, 16px);
        transform: none !important;
      }

      .hero-line {
        font-size: clamp(24px, 7.5vw, 36px);
        white-space: normal;
        line-height: 1.18;
      }

      /* 4 circles — organic scatter (mirrors desktop feel) */
      .circle { width: 130px; height: 130px; }

      .c1 { left: 5%;   top: 18%; }   /* upper-left          */
      .c2 { right: 6%;  top: 26%; }   /* upper-right, lower  */
      .c3 { left: 9%;   top: 53%; }   /* mid-left            */
      .c4 { right: 4%;  top: 58%; }   /* mid-right, lower    */
    }
    /* ── MODAL OVERLAY ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: #fff;
      z-index: 8000;
      overflow: hidden;
    }

    .modal-inner {
      position: absolute;
      inset: 0;
      overflow-y: auto;
      opacity: 0;
      transition: opacity 0.4s ease;
      padding: 72px clamp(24px, 6vw, 100px) 80px;
    }

    .modal-inner.visible { opacity: 1; }

    .modal-close {
      position: sticky;
      top: 0;
      float: right;
      display: flex;
      align-items: center;
      gap: 7px;
      background: none;
      border: 1.5px solid #000;
      border-radius: 999px;
      padding: 7px 18px;
      font-family: 'DM Sans', ui-sans-serif, system-ui, sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.02em;
      cursor: pointer;
      color: #000;
      z-index: 10;
      margin-bottom: 12px;
      transition: background 0.15s, color 0.15s;
    }
    .modal-close:hover { background: #000; color: #fff; }

    .modal-title {
      font-size: clamp(36px, 5vw, 72px);
      font-weight: 800;
      color: #000;

    .org-card {

    .org-name {
      font-size: 15px;
      font-weight: 800;
      color: #000;

    .org-role {

    .proj-section-title {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.13em;
      color: #aaa;
      margin-bottom: 0;
      padding-bottom: 14px;
      border-bottom: 1px solid #000;
    }

    /* Flat vertical list — no box grid */
    .proj-grid {
      display: flex;
      flex-direction: column;
      margin-bottom: 48px;
    }

    .proj-card {
      display: grid;
      grid-template-columns: 1fr auto;
      column-gap: 24px;
      row-gap: 9px;
      padding: 22px 0;
      border-bottom: 1px solid rgba(0,0,0,0.1);
    }

    .proj-name {
      font-size: 18px;
      font-weight: 800;
      color: #000;
      letter-spacing: -0.03em;
      line-height: 1.15;
      grid-column: 1;
      grid-row: 1;
    }

    .proj-status {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #aaa;
      grid-column: 2;
      grid-row: 1;
      padding-top: 4px;
      white-space: nowrap;
    }

    .proj-desc {
      font-size: 13.5px;
      font-weight: 400;
      color: #555;
      line-height: 1.65;
      grid-column: 1 / 3;
      grid-row: 2;
      max-width: 68ch;
    }

    /* Tags as plain dot-joined text — no pill spans */
    .proj-tags {
      font-size: 10.5px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;

      grid-row: 3;
    }

    .proj-divider {
      width: 100%;
      height: 1px;
      background: #000;
      margin: 8px 0 44px;
    }

    /* ── MODAL — MOBILE ── */
    @media (max-width: 640px) {

      .modal-inner {
        padding: 0 0 100px;
      }

        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        width: 100%;
        float: none;
        border-radius: 0;
        border: none;
        border-bottom: 1px solid rgba(0,0,0,0.1);
        margin: 0;
        padding: 16px 20px;
        background: #fff;
        justify-content: flex-start;
        font-size: 14px;
        z-index: 20;
      }

      .modal-title {
        font-size: 28px;
        margin: 72px 20px 32px;
        margin-bottom: 32px;
      }

      .org-section-title, .proj-section-title {

        letter-spacing: 0.14em;
        margin: 0 20px 4px;
      }

      .org-grid {
        display: flex;
        flex-direction: column;
        gap: 0;
        margin-bottom: 0;
      }

      .org-card {
        flex-direction: row;
        align-items: center;
        gap: 16px;
        padding: 14px 20px;
        border-bottom: 1px solid rgba(0,0,0,0.07);
      }
      .org-card:last-child { border-bottom: none; }

      .org-logo-wrap { width: 48px; height: 48px; flex-shrink: 0; }
      .org-name  { font-size: 14px; }
      .org-role  { font-size: 12px; color: #666; }
      .org-section { margin-bottom: 0; }

      .org-divider, .proj-divider {
        height: 1px;
        background: #000;
        margin: 24px 20px 20px;
        width: auto;
      }

      /* Project: full-width stacked cards */
      .proj-grid {
        display: flex;
        flex-direction: column;
        border: none;
        margin: 0 0 16px;
      }

      .proj-card {
        margin: 0;
        border: none;
        border-bottom: 1px solid rgba(0,0,0,0.1);
        padding: 20px 20px;
        border-radius: 0;
      }
      .proj-card:last-child { border-bottom: none; }

      .proj-name  { font-size: 15px; }
      .proj-desc  { font-size: 12px; }
      .proj-section { margin-bottom: 0; }

      /* ME modal — mobile */
      .me-inner {
        padding: 72px 24px 32px;   /* 72px clears the fixed back-bar */

        max-width: 100%;
        box-sizing: border-box;
      }

      .me-photo {
        width: 96px;
        height: 96px;
        margin-bottom: 16px;
      }

      .me-name {
        font-size: 24px;
        margin-bottom: 20px;      /* skip the removed title, jump to socials */
      }

      .me-social {
        gap: 8px;
        margin-bottom: 28px;
      }

      .me-social-link {
        padding: 9px 16px;
        font-size: 12px;
      }

      .me-bio-text {

        line-height: 1.7;
      }

    (async function curtainReveal() {
      const curtL   = document.getElementById('curtL');
      const curtR   = document.getElementById('curtR');
      const seam    = document.getElementById('curtSeam');
      const header  = document.querySelector('.ticker-header');
      const btn     = document.querySelector('.contact-btn');
      const hero    = document.getElementById('heroText');
      const circs   = ['circ1','circ2','circ3','circ4'].map(id => document.getElementById(id));

      /* Tiny helper: returns a promise that resolves after ms milliseconds */
      const wait = ms => new Promise(r => setTimeout(r, ms));

      /* ── Phase 1: Heavy gravity drop ────────────────────────────────
         0 → 1 600 ms  |  total ~1.6 s
         Falls fast from above, overshoots slightly (weight), then settles.  */
      const dropKFs = [
        { transform: 'translateY(-100vh)', easing: 'cubic-bezier(0.55, 0, 0.25, 1)' },
        { transform: 'translateY(12px)',   offset: 0.82, easing: 'cubic-bezier(0.4, 0, 0.6, 1)' },
        { transform: 'translateY(-7px)',   offset: 0.90, easing: 'ease' },
        { transform: 'translateY(3px)',    offset: 0.96, easing: 'ease' },
        { transform: 'translateY(0)',      offset: 1 }
      ];
      const dropOpts = { duration: 1700, fill: 'forwards' };

      const lDrop = curtL.animate(dropKFs, dropOpts);
      const rDrop = curtR.animate(dropKFs, dropOpts);

      await Promise.all([lDrop.finished, rDrop.finished]);

      /* Commit position so the transform doesn't fight the next animation */
      [curtL, curtR, seam].forEach(el => {
        el.style.transform = '';
        el.getAnimations().forEach(a => a.cancel());
      });

      /* ── Phase 2: Weight pause ───────────────────────────────────────
         1 600 → 2 100 ms  |  500 ms hold — "you feel the mass"          */
      await wait(500);

      /* ── Phase 3: Dramatic split ─────────────────────────────────────
         2 100 → 3 700 ms  |  1 600 ms
         Easing: slow-in → explosive exit (like a spring release)         */
      const splitEase = 'cubic-bezier(0.87, 0, 0.13, 1)';
      const splitDur  = 1700;

      curtL.animate(
        [{ transform: 'translateX(0)' }, { transform: 'translateX(-100%)' }],
        { duration: splitDur, fill: 'forwards', easing: splitEase }
      );
      const rSplit = curtR.animate(
        [{ transform: 'translateX(0)' }, { transform: 'translateX(100%)' }],
        { duration: splitDur, fill: 'forwards', easing: splitEase }
      );

      /* Seam vanishes instantly as split begins */
      seam.animate(
        [{ opacity: 1 }, { opacity: 0 }],
        { duration: 250, fill: 'forwards' }
      );

      /* ── Content fade-in (starts 350 ms into the split) ─────────── */
      await wait(350);

      /* Header + button */
      [header, btn].forEach(el => {
        el.animate(
          [
            { opacity: 0, transform: 'translateY(8px)' },
            { opacity: 1, transform: 'translateY(0)'   }
          ],
          { duration: 900, fill: 'forwards', easing: 'cubic-bezier(0.22, 1, 0.36, 1)' }
        );
      });

      /* Hero text — slight delay after header */
      await wait(120);
      hero.animate(
        [
          { opacity: 0, transform: 'translate(-50%, calc(-50% + 14px))' },
          { opacity: 1, transform: 'translate(-50%, -50%)'               }
        ],
        { duration: 1000, fill: 'forwards', easing: 'cubic-bezier(0.22, 1, 0.36, 1)' }
      );

      /* Circles — staggered pop-in */
      circs.forEach((c, i) => {
        c.animate(
          [
            { opacity: 0, transform: 'scale(0.6)' },
            { opacity: 1, transform: 'scale(1)'   }
          ],
          { duration: 700, delay: i * 140, fill: 'forwards', easing: 'cubic-bezier(0.34, 1.56, 0.64, 1)' }
        );
      });

      /* ── Cleanup ─────────────────────────────────────────────────── */
      await rSplit.finished;
      curtL.remove();
      curtR.remove();
      seam.remove();
    })();

    function openCircleModal(btnEl, contentHTML) {
      const rect = btnEl.getBoundingClientRect();
      const cx   = rect.left + rect.width  / 2;
      const cy   = rect.top  + rect.height / 2;
      const r    = rect.width / 2;

      const overlay = document.createElement('div');
      overlay.className = 'modal-overlay';
      overlay.style.clipPath = `circle(${r}px at ${cx}px ${cy}px)`;

      overlay.innerHTML = `
        <div class="modal-inner" id="modalInner">
          <button class="modal-close" id="modalCloseBtn">← Back</button>
          ${contentHTML}
        </div>
      `;

      document.body.appendChild(overlay);

      /* Force reflow so the initial clip-path is painted before transition */
      overlay.getBoundingClientRect();

      /* Expand the circle to fill the screen */
      overlay.style.transition = 'clip-path 1.3s cubic-bezier(0.4, 0, 0.2, 1)';
      overlay.style.clipPath = `circle(200vmax at ${cx}px ${cy}px)`;

      /* Fade in content after expansion */
      setTimeout(() => {
        document.getElementById('modalInner').classList.add('visible');
      }, 1100);

      /* Close */
      document.getElementById('modalCloseBtn').addEventListener('click', () => {
        const inner = document.getElementById('modalInner');
        inner.style.opacity = '0';
        setTimeout(() => {
          overlay.style.transition = 'clip-path 0.55s cubic-bezier(0.4, 0, 0.2, 1)';
          overlay.style.clipPath = `circle(${r}px at ${cx}px ${cy}px)`;
          setTimeout(() => overlay.remove(), 560);
        }, 200);
      });
    }
