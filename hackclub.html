<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Raw Logic Hack Club | Coming Soon</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;500;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              display: ['Outfit', 'sans-serif'],
            },
            colors: {
              'charcoal': '#1a1614',
              'mocha': '#2A2422',
              'sand': '#E5D4B8',
              'gold': '#D4AF37',
              'glass-border': 'rgba(255, 255, 255, 0.08)',
              'glass-surface': 'rgba(255, 255, 255, 0.03)',
            }
          }
        }
      }
    </script>
    <style>
      body { background-color: #1a1614; overflow-x: hidden; }
      .noise-overlay { position: fixed; inset: 0; pointer-events: none; z-index: 50; opacity: 0.05; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='1'/%3E%3C/svg%3E"); }
    </style>
</head>
<body class="text-gray-200 antialiased relative min-h-screen flex flex-col items-center justify-center p-6 text-center">
    <div class="fixed top-[-10%] left-[-10%] w-[50vw] h-[50vw] bg-red-500/5 rounded-full blur-[120px] pointer-events-none"></div>
    <div class="noise-overlay"></div>
    <main class="relative z-10 max-w-2xl w-full">
        <div class="p-12 rounded-[40px] bg-glass-surface border border-glass-border backdrop-blur-3xl shadow-2xl">
            <div class="inline-flex items-center justify-center p-5 bg-red-500 rounded-3xl text-white mb-10 shadow-lg shadow-red-500/30">
                <i data-lucide="terminal" class="w-12 h-12"></i>
            </div>
            <h1 class="text-4xl md:text-6xl font-display font-bold text-white mb-6">Raw Logic <br/><span class="text-red-500">Hack Club</span></h1>
            <div class="inline-flex items-center gap-2 px-5 py-2 rounded-full bg-red-500/10 border border-red-500/20 text-red-500 text-xs font-bold uppercase tracking-[0.2em] mb-8">
                <span class="relative flex h-2 w-2">
                  <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-500 opacity-75"></span>
                  <span class="relative inline-flex rounded-full h-2 w-2 bg-red-500"></span>
                </span>
                Coming Soon
            </div>
            <p class="text-lg text-gray-400 leading-relaxed mb-10">
                A non-profit community space for students to explore, build, and hack. We're currently crafting a digital arena for the next generation of engineers.
            </p>
            <a href="index.html" class="inline-flex items-center gap-2 px-8 py-4 rounded-full bg-white/5 border border-white/10 text-gray-300 hover:text-white hover:bg-white/10 transition-all font-medium group">
                <i data-lucide="arrow-left" class="w-4 h-4 group-hover:-translate-x-1 transition-transform"></i>
                Back to Portfolio
            </a>
        </div>
    </main>
    <footer class="relative z-10 py-10 text-white/10 text-[10px] uppercase tracking-widest font-bold">
        Raw Logic • Hack Club Local Chapter
    </footer>
    <script>lucide.createIcons();</script>
</body>
</html>
